name: CICD DevSecOps

on: 
  push:
    branches: [ "main"]
    paths-ignore:
      - "**/*.md"
      - "kubernetes/*.yml" # mencegah infinite loop
      - ".github/workflows/cicd.yml"
      - "iac/terraform/*.tfvars"
      - "iac/terraform/*.tf"
      - "iac/ansible/*.yml"
  pull_request:
    branches: [ "main"]
    paths-ignore:
      - "**/*.md"
      - "kubernetes/*.yml" # mencegah infinite loop
      - ".github/workflows/cicd.yml"
      - "iac/terraform/*.tfvars"
      - "iac/terraform/*.tf"
      - "iac/ansible/*.yml"

jobs:

    lint:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Test
        run: echo "App ini tidak memiliki tahapan Test."

      - name: Run Lint
        run: npm run lint

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # Ini akan mengagalkan pipeline jika ada vulnerability
          severity: 'CRITICAL,HIGH'


    docker:
      needs: lint
      runs-on: ubuntu-latest
      steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/capi-frontend:${{ github.run_id }}
          load: true
          build-args: NEXT_PUBLIC_API_URL=https://capi.etherian.dev/api


      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/capi-backend:${{ github.run_id }}
          load: true

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/worker
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/capi-worker:${{ github.run_id}}
          load: true


      - name: Run Trivy vulnerability scanner frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/capi-frontend:${{ github.run_id}}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os"
          severity: "CRITICAL,HIGH"

      - name: Run Trivy vulnerability scanner backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/capi-backend:${{ github.run_id}}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os"
          severity: "CRITICAL,HIGH"

      - name: Run Trivy vulnerability scanner worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/capi-worker:${{ github.run_id}}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os"
          severity: "CRITICAL,HIGH"


      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/capi-frontend:${{ github.run_id}}

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/capi-backend:${{ github.run_id}}


      - name: Push worker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/capi-worker:${{ github.run_id}}

    
    update-k8s:
      needs: docker
      runs-on: ubuntu-latest
      permissions:
        contents: write
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN}}

      - name: Setup Git config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Update K8s Manifest
        run: |
          sed -i 's|capi-frontend:.*|capi-frontend:${{ github.run_id }}|g' kubernetes/deployment.yml
          sed -i 's|capi-backend:.*|capi-backend:${{ github.run_id }}|g' kubernetes/deployment.yml
          sed -i 's|capi-worker:.*|capi-worker:${{ github.run_id }}|g' kubernetes/deployment.yml

      - name: Commit and push changes
        run: |
          git add kubernetes/deployment.yml
          git commit -m "Update image tag: ${{ github.run_id }} [skip ci]" || echo "No changes to commit"
          git push