version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: capi-postgres
    environment:
      POSTGRES_USER: capi
      POSTGRES_PASSWORD: capi_password
      POSTGRES_DB: capi_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U capi -d capi_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: capi-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./apps/frontend
    container_name: capi-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./apps/backend
    container_name: capi-backend
    ports:
      - "3001:3001"
    depends_on:
      - worker
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://capi:capi_password@postgres:5432/capi_db
    

  worker:
    build: ./apps/worker
    container_name: capi-worker
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://capi:capi_password@postgres:5432/capi_db

    

volumes:
  postgres_data:
  redis_data:
